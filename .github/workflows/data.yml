# 주 1회 데이터 갱신: Fandom 배너 크롤 + parquet 재빌드 → 커밋 → Pages 자동 재배포
name: refresh-data
on:
  schedule:
    - cron: "0 3 * * 1"   # 매주 월 03:00 UTC
  workflow_dispatch:        # 수동 실행 버튼
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r scripts/requirements.txt
      - run: python scripts/fetch_banners.py
      - run: python scripts/build_data.py
      - run: python scripts/fetch_external_tiers.py
      - name: commit if changed
        run: |
          git config user.name "data-bot"
          git config user.email "bot@users.noreply.github.com"
          git add site/public/data data/raw/banner_history.json || true
          git diff --cached --quiet || git commit -m "data: weekly refresh $(date -u +%F)"
          git push
